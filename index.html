<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TMV Gesso - Orçamentos</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color"
content="#006d6f">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <div class="cabecalho">

            <h1>TMV GESSO</h1>

            <p>
                Forros • Divisórias • Acabamentos
            </p>

            <hr>

        </div>

        <div class="input-group">

            <label>Cliente</label>

            <input
            type="text"
            id="cliente">

        </div>

        <div class="input-group">

            <label>Telefone</label>

            <input
            type="text"
            id="telefone">

        </div>

        <div class="input-group">

            <label>Endereço</label>

            <input
            type="text"
            id="endereco">

        </div>

        <div class="input-group">

            <label>Ambiente / Local</label>

            <input
            type="text"
            id="local">

        </div>

        <div class="input-group">

            <label>Largura (m)</label>

            <input
            type="number"
            step="0.01"
            id="largura">

        </div>

        <div class="input-group">

            <label>Comprimento (m)</label>

            <input
            type="number"
            step="0.01"
            id="comprimento">

        </div>

        <div class="input-group">

            <label>Valor por m² (R$)</label>

            <input
            type="number"
            step="0.01"
            id="valorMetro">

        </div>

        <button
        class="btn calc"
        onclick="calcular()">

            Calcular e Salvar

        </button>

        <button
        class="btn pdf"
        onclick="window.print()">

            Gerar PDF

        </button>

        <button
        class="btn reset"
        onclick="resetar()">

            Resetar Histórico

        </button>

        <div class="box">

            <h2>
                Resultado do Ambiente
            </h2>

            <p id="resultadoArea">

                Área: 0 m²

            </p>

            <p id="resultadoValor">

                Valor: R$ 0,00

            </p>

        </div>

        <div class="box">

            <h2>
                Totais Gerais
            </h2>

            <p id="totalArea">

                Metragem Total: 0 m²

            </p>

            <p id="totalValor">

                Valor Total Geral: R$ 0,00

            </p>

        </div>

        <div class="box">

            <h2>
                Histórico
            </h2>

            <div id="historico">

            </div>

        </div>

    </div>

</div>

<script src="main.js">

</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>

</html>
